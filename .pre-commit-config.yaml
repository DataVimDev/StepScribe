repos:
- repo: https://github.com/pycqa/isort
  rev: 7.0.0
  hooks:
    - id: isort
      args: [ --profile=black]
      name: isort (python)
- repo: https://github.com/psf/black
  rev: 25.12.0
  hooks:
    - id: black-jupyter
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.14.10
  hooks:
    - id: ruff
