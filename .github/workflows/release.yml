name: PyPI release

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-publish:
    name: Build and publish Python distro to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # This permission is required for trusted publishing
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install
      
      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish
